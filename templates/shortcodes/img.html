{#- img shortcode.
    Usage:
      {{ img(src="wiring-fail.jpeg", alt="Wiring fail", w=500) }}
      {{ img(src="wiring-fail.jpeg", alt="Wiring fail") }}
-#}
{% if w %}
  {% set max_width = w ~ "px" %}
{% else %}
  {% set max_width = "100%" %}
{% endif %}
<figure class="ms-img" style="margin: var(--space-md) auto; max-width: min(100%, {{ max_width }}); text-align: center;">
  <img src="{{ src }}" alt="{{ alt }}" style="display: block; margin: 0 auto; width: 100%; max-width: {{ max_width }}; height: auto;" />
</figure>
